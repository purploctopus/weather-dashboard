<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Weather Base Station</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #ffffff; margin: 20px; }
        h1 { color: #f5f5f7; margin-bottom: 25px; font-weight: 500; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #2a2a2a; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .label { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8e8e93; }
        .value { font-size: 2.2rem; font-weight: 700; margin-top: 10px; color: #00ffcc; }
    </style>
</head>
<body>
    <h1>🏡 Garden Weather Base Station</h1>
    <div class="grid">
        <div class="card"><div class="label">Temperature</div><div class="value" id="temp-val">-- °F</div></div>
        <div class="card"><div class="label">Humidity</div><div class="value" id="humid-val">-- %</div></div>
        <div class="card"><div class="label">Barometric Pressure</div><div class="value" id="press-val">-- hPa</div></div>
        <div class="card"><div class="label">Wind Speed</div><div class="value" id="wind-val">-- MPH</div></div>
        <div class="card"><div class="label">Wind Direction</div><div class="value" id="dir-val">--</div></div>
        <div class="card"><div class="label">Total Rainfall</div><div class="value" id="rain-val">-- in</div></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
